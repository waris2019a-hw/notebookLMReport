                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="bg-white rounded-2xl md:rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden mb-6">

                    <thead class="sticky top-0 bg-slate-50/95 backdrop-blur-sm z-10">

                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">สาขาวิชา</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">ผู้แต่ง</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 text-right">ลิงก์</th>
                        </tr>
                    </thead>
                    <tbody id="tableBodyDesktop" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>

            <div id="cardContainerMobile" class="md:hidden divide-y divide-slate-100">

            {"คณะ": "ศูนย์ภาษาต่างประเทศ", "สาขาวิชา": "ศูนย์ภาษาต่างประเทศ", "Author": "อ.นฤมล สเนลโกรฟ", "Attachment link": "https://notebooklm.google.com/notebook/f49e94a2-aabc-4ca5-8b51-ed143aea1a31"},
            {"คณะ": "ศูนย์ภาษาต่างประเทศ", "สาขาวิชา": "ศูนย์ภาษาต่างประเทศ", "Author": "อ.กัญจน์วรางค์ เฉลิมเมือง", "Attachment link": "https://notebooklm.google.com/notebook/24ab367e-996c-4ad7-be15-7b687ba33fd2?authuser=1"},
            {"คณะ": "ดิจิทัล", "สาขาวิชา": "ธุรกิจดิจิทัล", "Author": "อ กัญณัฏฐ์ สุริยันต์", "Attachment link": "https://notebooklm.google.com/notebook/ad273eee-50d3-4a7d-aecd-8dfcf1101b9b"},
            {"คณะ": "ดิจิทัล", "สาขาวิชา": "ธุรกิจดิจิทัล", "Author": "อ.ประวีณ ไม้เกตุ", "Attachment link": "https://notebooklm.google.com/notebook/c072d08c-197d-4582-9820-8d9ea522b7b9"}
        ];

        let filteredData = [...embeddedData];
        const searchInput = document.getElementById('searchInput');
        const facultyFilter = document.getElementById('facultyFilter');
        const tableBodyDesktop = document.getElementById('tableBodyDesktop');
        const cardContainerMobile = document.getElementById('cardContainerMobile');
        const rowCountDisplay = document.getElementById('rowCountDisplay');
        const downloadBtn = document.getElementById('downloadBtn');
        const emptyState = document.getElementById('emptyState');
        const statTotalItems = document.getElementById('statTotalItems');
        const statTotalFaculties = document.getElementById('statTotalFaculties');

        window.onload = function() {
            setupFacultiesDropdown();
            renderReport();
        };

        function setupFacultiesDropdown() {
            const faculties = [...new Set(embeddedData.map(item => item['คณะ']).filter(Boolean))].sort();
            facultyFilter.innerHTML = '<option value="all">ทุกหน่วยงาน</option>';
            faculties.forEach(fac => {
                const option = document.createElement('option');
                option.value = fac;
                option.textContent = fac;
                facultyFilter.appendChild(option);
            });
        }

        function renderReport() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedFaculty = facultyFilter.value;

            filteredData = embeddedData.filter(item => {
                const searchContent = `${item['คณะ']} ${item['สาขาวิชา']} ${item['Author']}`.toLowerCase();
                const matchSearch = searchContent.includes(searchTerm);
                const matchFaculty = selectedFaculty === 'all' || item['คณะ'] === selectedFaculty;
                return matchSearch && matchFaculty;
            });

            // Clear previous content
            tableBodyDesktop.innerHTML = '';
            cardContainerMobile.innerHTML = '';
            
            if (filteredData.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filteredData.forEach(item => {
                    // Desktop Table Row
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50/40 transition-colors";
                    tr.innerHTML = `
                        <td class="p-4 border-b border-slate-50 font-bold text-slate-800">${item['คณะ'] || '-'}</td>
                        <td class="p-4 border-b border-slate-50 text-slate-500">${item['สาขาวิชา'] || '-'}</td>
                        <td class="p-4 border-b border-slate-50 font-semibold text-slate-900">${item['Author'] || '-'}</td>
                        <td class="p-4 border-b border-slate-50 text-right">
                            ${item['Attachment link'] ? `
                                <a href="${item['Attachment link']}" target="_blank" class="text-blue-500 hover:text-blue-700 transition-colors inline-block" title="ดูผลงาน">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                </a>
                            ` : '-'}
                        </td>
                    `;
                    tableBodyDesktop.appendChild(tr);

                    // Mobile Card
                    const card = document.createElement('div');
                    card.className = "p-5 flex flex-col gap-2 bg-white";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${item['คณะ'] || 'ไม่ระบุหน่วยงาน'}</span>
                            ${item['Attachment link'] ? `
                                <a href="${item['Attachment link']}" target="_blank" class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                </a>
                            ` : ''}
                        </div>
                        <h4 class="text-sm font-bold text-slate-900 leading-tight">${item['Author'] || 'ไม่ทราบชื่อผู้แต่ง'}</h4>
                        <p class="text-xs text-slate-500 font-medium italic">${item['สาขาวิชา'] || '-'}</p>
                    `;
                    cardContainerMobile.appendChild(card);
                });
            }
            updateStats();
        }

        function updateStats() {
            statTotalItems.textContent = filteredData.length.toLocaleString();
            const uniqueFacs = [...new Set(filteredData.map(item => item['คณะ']).filter(Boolean))];
            statTotalFaculties.textContent = uniqueFacs.length.toLocaleString();
            rowCountDisplay.textContent = `พบ ${filteredData.length} รายการ`;
        }

        searchInput.addEventListener('input', renderReport);
        facultyFilter.addEventListener('change', renderReport);

        downloadBtn.addEventListener('click', function() {
            if (filteredData.length === 0) return;
            const headers = ["หน่วยงาน", "สาขาวิชา", "ผู้แต่ง", "ลิงก์"];
            const csvContent = [
                headers.join(','),
                ...filteredData.map(row => [
                    `"${row['คณะ'] || ''}"`,
                    `"${row['สาขาวิชา'] || ''}"`,
                    `"${row['Author'] || ''}"`,
                    `"${row['Attachment link'] || ''}"`
                ].join(','))
            ].join('\n');
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `notebook_report_mobile.csv`);
            link.click();
        });
    </script>
